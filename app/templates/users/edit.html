{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h1>Edit Employee</h1>
    <p>Update role or reset password for <strong>{{ user.username }}</strong>.</p>
  </div>
</div>

<div class="card" style="max-width:480px">
  <form method="POST">
    <div class="form-group" style="margin-bottom:14px">
      <label>Username (cannot be changed)</label>
      <input type="text" value="{{ user.username }}" disabled style="opacity:0.6"/>
    </div>
    <div class="form-group" style="margin-bottom:14px">
      <label for="role">Role</label>
      <select id="role" name="role">
        <option value="staff" {% if user.role == 'staff' %}selected{% endif %}>Employee</option>
        <option value="admin" {% if user.role == 'admin' %}selected{% endif %}>Admin</option>
      </select>
    </div>
    <div class="form-group" style="margin-bottom:18px">
      <label for="password">New Password <span style="color:var(--color-text-muted);font-weight:400">(leave blank to keep current)</span></label>
      <input type="password" id="password" name="password" placeholder="Min 6 characters"/>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">Save Changes</button>
      <a href="{{ url_for('auth.list_users') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
