{% extends "base.html" %}
{% block content %}

<div class="page-header">
  <div class="page-header-left">
    <h1>{{ 'Edit Product' if product else 'Add Product' }}</h1>
    <p>{{ 'Update product details.' if product else 'Add a new product to inventory.' }}</p>
  </div>
</div>

<div class="card" style="max-width:680px">
  <form method="POST">
    <div class="form-grid-2">
      <div class="form-group">
        <label for="name">Product Name</label>
        <input type="text" id="name" name="name" required
               value="{{ product.name if product else '' }}"/>
      </div>
      <div class="form-group">
        <label for="sku">Category / SKU</label>
        <input type="text" id="sku" name="sku"
               value="{{ product.sku if product and product.sku else '' }}"
               placeholder="e.g., Cement, Steel"/>
      </div>
      <div class="form-group">
        <label for="cost_price">Buying Price (₹)</label>
        <input type="number" id="cost_price" name="cost_price" step="0.01" min="0"
               value="{{ product.cost_price if product else '0' }}"/>
      </div>
      <div class="form-group">
        <label for="unit_price">Selling Price (₹)</label>
        <input type="number" id="unit_price" name="unit_price" step="0.01" min="0"
               value="{{ product.unit_price if product else '0' }}"/>
      </div>
      {% if not product %}
      <div class="form-group">
        <label for="stock">Initial Stock</label>
        <input type="number" id="stock" name="stock" min="0" value="0"/>
      </div>
      {% endif %}
      <div class="form-group full-width">
        <label for="description">Description</label>
        <textarea id="description" name="description" placeholder="Optional description">{{ product.description if product and product.description else '' }}</textarea>
      </div>
    </div>
    <div class="form-actions">
      <button type="submit" class="btn btn-primary">
        {{ 'Update Product' if product else 'Add Product' }}
      </button>
      <a href="{{ url_for('products.list_products') }}" class="btn btn-secondary">Cancel</a>
    </div>
  </form>
</div>

{% endblock %}
